spring.application.name=techback

# Configurações de erro
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2/login

# Datasource
spring.datasource.url=jdbc:h2:~/teckback20262
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update

# JPA specific configs
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql=true

# JWT Settings
app.jwt.secret=94f6e4a2e5d7c88b489a24c8b2c452e894f6e4a2e5d7c88b489a24c8b2c452e894f6e4a2e5d7c88b489a24c8b2c452e8
app.jwt.expiration=86400000
app.jwt.expirationMs=86400000